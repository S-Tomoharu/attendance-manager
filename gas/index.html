<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授業欠課時数管理</title>
  <base target="_top">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:    #2563eb;
  --blue-lt: #eff6ff;
  --red:     #dc2626;
  --red-lt:  #fef2f2;
  --green:   #16a34a;
  --green-lt:#f0fdf4;
  --purple:  #7c3aed;
  --purple-lt:#f5f3ff;
  --gray:    #6b7280;
  --gray-lt: #f9fafb;
  --border:  #e5e7eb;
  --text:    #111827;
  --text-sm: #6b7280;
  --header-h: 56px;
  --radius:  8px;
}

body {
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 15px; color: var(--text); background: var(--gray-lt); min-height: 100vh;
}

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h); background: var(--blue); color: #fff;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.header-left  { display: flex; align-items: center; gap: 10px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.app-title    { font-size: 17px; font-weight: 600; white-space: nowrap; }
.app-version  { font-size: 11px; color: rgba(255,255,255,.6); white-space: nowrap; }
.icon-btn     { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
.icon-btn:hover { background: rgba(255,255,255,.2); }

.select-sm {
  padding: 4px 8px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,.4);
  background: rgba(255,255,255,.15); color: #fff; font-size: 14px; cursor: pointer;
}
.select-sm option { color: var(--text); background: #fff; }
input[type="date"].select-sm { color: #fff; }

.btn-primary {
  padding: 6px 14px; background: #fff; color: var(--blue);
  border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-primary:hover { background: #dbeafe; }
.btn-secondary {
  padding: 6px 14px; background: var(--gray-lt); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; cursor: pointer;
}
.btn-secondary:hover { background: var(--border); }
.btn-danger {
  padding: 6px 14px; background: var(--red-lt); color: var(--red);
  border: 1px solid var(--red); border-radius: var(--radius); font-size: 14px; cursor: pointer;
}
.btn-lg { padding: 10px 24px; font-size: 15px; }

.sidenav {
  position: fixed; top: 0; left: -260px; bottom: 0; width: 260px;
  background: #fff; z-index: 300; box-shadow: 2px 0 12px rgba(0,0,0,.12);
  transition: left .25s ease; display: flex; flex-direction: column;
}
.sidenav.open { left: 0; }
.sidenav-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 16px;
}
.sidenav-header .icon-btn { color: var(--text); }
.sidenav-list { list-style: none; padding: 8px 0; }
.sidenav-item {
  display: block; padding: 13px 20px; color: var(--text);
  text-decoration: none; font-size: 15px; border-left: 3px solid transparent;
}
.sidenav-item:hover  { background: var(--gray-lt); }
.sidenav-item.active { background: var(--blue-lt); color: var(--blue); border-left-color: var(--blue); font-weight: 600; }

.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
}
.overlay.show { display: block; }

.main { margin-top: var(--header-h); padding: 16px; max-width: 960px; margin-left: auto; margin-right: auto; }
.view { display: none; }
.view.active { display: block; }

.view-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
}
.legend { display: flex; gap: 8px; flex-wrap: wrap; }
.legend-item {
  font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500;
}
.legend-item.present  { background: var(--green-lt);  color: var(--green); }
.legend-item.absent   { background: var(--red-lt);    color: var(--red); }
.legend-item.excused  { background: var(--blue-lt);   color: var(--blue); }
.legend-item.leave    { background: #f3f4f6; color: #6b7280; }
.legend-item.kiki     { background: #f3e8ff; color: #9333ea; }
.legend-item.teishi   { background: #fff7ed; color: #ea580c; }
.absent-count { font-size: 14px; color: var(--text-sm); font-weight: 500; }

.blackboard {
  background: #2d4a2d; color: #c8e6c9; text-align: center;
  padding: 8px; border-radius: var(--radius); margin-bottom: 12px;
  font-size: 13px; letter-spacing: 4px;
}

.seat-map { display: grid; gap: 6px; justify-content: center; }

.seat {
  width: 72px; height: 64px; border-radius: var(--radius);
  border: 2px solid var(--border); background: #fff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; user-select: none; transition: transform .1s, box-shadow .1s;
  font-size: 12px; text-align: center; padding: 4px; position: relative;
}
.seat:hover { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.seat.empty { background: var(--gray-lt); border-color: transparent; cursor: default; opacity: .4; }
.seat.empty:hover { transform: none; box-shadow: none; }
.seat .seat-number { font-size: 10px; color: var(--text-sm); margin-bottom: 2px; }
.seat .seat-name   { font-weight: 600; font-size: 12px; line-height: 1.2; }
.seat .seat-badge  { position: absolute; top: 3px; right: 3px; font-size: 9px; padding: 1px 5px; border-radius: 10px; font-weight: 600; }

.seat.present  { border-color: var(--green);  background: var(--green-lt); }
.seat.absent   { border-color: var(--red);    background: var(--red-lt); }
.seat.excused  { border-color: var(--blue);   background: var(--blue-lt); }
.seat.leave-seat { border-color: #d1d5db; background: #f3f4f6; opacity: .6; }
.seat.kiki    { border-color: #9333ea; background: #f3e8ff; }
.seat.teishi  { border-color: #ea580c; background: #fff7ed; }
.seat.kiki   .seat-badge { background: #9333ea; color: #fff; }
.seat.teishi .seat-badge { background: #ea580c; color: #fff; }

.seat.absent  .seat-badge { background: var(--red);  color: #fff; }
.seat.excused .seat-badge { background: var(--blue); color: #fff; }
.leave-badge               { background: #9ca3af; color: #fff; }

.number-search { display: flex; gap: 8px; margin-bottom: 16px; }
.number-search input {
  flex: 1; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 16px;
}
.student-list { display: flex; flex-direction: column; gap: 8px; }
.student-row {
  display: flex; align-items: center; justify-content: space-between;
  background: #fff; padding: 12px 16px; border-radius: var(--radius);
  border: 1px solid var(--border); cursor: pointer;
}
.student-row:hover { background: var(--gray-lt); }
.student-row.on-leave { opacity: .6; }
.student-row-left { display: flex; align-items: center; gap: 12px; }
.student-row-num  { font-size: 13px; color: var(--text-sm); min-width: 30px; }
.student-row-name { font-weight: 600; }

.status-badge { font-size: 12px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.status-badge.present  { background: var(--green-lt);  color: var(--green); }
.status-badge.absent   { background: var(--red-lt);    color: var(--red); }
.status-badge.excused  { background: var(--blue-lt);   color: var(--blue); }
.status-badge.leave    { background: #f3f4f6; color: #6b7280; }
.status-badge.kiki    { background: #f3e8ff; color: #9333ea; }
.status-badge.teishi  { background: #fff7ed; color: #ea580c; }

.history-filter { display: flex; gap: 8px; margin-bottom: 16px; }
.history-table-wrap { overflow-x: auto; }
.history-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--radius); overflow: hidden; }
.history-table th { background: var(--blue); color: #fff; padding: 10px 14px; text-align: left; font-size: 13px; }
.history-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 14px; }
.history-table tr:last-child td { border-bottom: none; }

.section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--blue); }
.settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.settings-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.settings-card h3 { font-size: 15px; margin-bottom: 12px; }
.settings-card label { display: block; font-size: 13px; color: var(--text-sm); margin-bottom: 4px; }
.settings-card input[type="number"] { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
.settings-actions { margin-top: 12px; }

.csv-section { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.hint { font-size: 13px; color: var(--text-sm); margin-bottom: 12px; }
.csv-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.file-label { cursor: pointer; }
#csv-preview { font-size: 13px; color: var(--text-sm); }

.summary-section { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.summary-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.summary-row label { font-size: 14px; font-weight: 500; }
.summary-row input[type="date"] { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }

.setup-form { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.form-label { font-size: 14px; font-weight: 500; display: flex; flex-direction: column; gap: 4px; }
.form-input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
#years-list { display: flex; flex-direction: column; gap: 8px; }
.year-row {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
}

.popup-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.5); align-items: center; justify-content: center;
}
.popup-overlay.show { display: flex; }
.popup {
  background: #fff; border-radius: 16px; padding: 24px;
  min-width: 280px; max-width: 340px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,.2); text-align: center;
}
.popup-student-name   { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.popup-student-number { font-size: 14px; color: var(--text-sm); margin-bottom: 20px; }
.popup-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.popup-btn {
  padding: 12px 8px; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.popup-btn:hover { opacity: .85; }
.popup-btn.present  { grid-column: 1/-1; background: var(--green);  color: #fff; }
.popup-btn.absent   { background: var(--red);   color: #fff; }
.popup-btn.kiki     { background: #9333ea; color: #fff; }
.popup-btn.excused  { background: var(--blue);  color: #fff; }
.popup-btn.teishi   { background: #ea580c; color: #fff; }
.popup-close { background: none; border: none; color: var(--text-sm); font-size: 14px; cursor: pointer; padding: 4px 12px; }

.leave-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.leave-form label { font-size: 14px; font-weight: 500; display: flex; flex-direction: column; gap: 4px; }
.leave-form input[type="date"] { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
.leave-buttons { display: flex; gap: 8px; justify-content: center; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 24px;
  font-size: 14px; z-index: 1000; transition: transform .3s ease;
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .header-right { gap: 6px; }
  .select-sm { font-size: 13px; padding: 3px 6px; }
  .seat { width: 60px; height: 54px; }
  .seat .seat-name { font-size: 11px; }
}

.class-manager { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.class-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
.class-list-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px;
}
.class-list-item:last-child { border-bottom: none; }
.class-list-item .class-name { font-weight: 600; }
.btn-delete {
  padding: 4px 10px; background: var(--red-lt); color: var(--red);
  border: 1px solid var(--red); border-radius: 6px; font-size: 12px; cursor: pointer;
}

.class-select-screen { max-width: 400px; margin: 40px auto; }
.class-select-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; text-align: center; }
.class-select-btn {
  display: block; width: 100%; padding: 18px;
  background: #fff; border: 2px solid var(--border);
  border-radius: var(--radius); font-size: 18px; font-weight: 600;
  cursor: pointer; margin-bottom: 10px; text-align: center;
  transition: border-color .15s, background .15s;
}
.class-select-btn:hover { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }

/* ===== 座席マップ＋名簿レイアウト ===== */
.seat-roster-layout {
  display: flex; gap: 10px; align-items: flex-start;
}
.calendar-area {
  width: 15%; flex-shrink: 0;
}
.seat-area {
  width: 65%; flex-shrink: 0; display: flex; flex-direction: column;
}
.roster-area {
  width: 20%; flex-shrink: 0;
  background: #fff; border-radius: var(--radius);
  border: 1px solid var(--border);
  max-height: calc(100vh - 140px); overflow-y: auto;
}
.roster-list { }
.roster-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; font-size: 13px;
}
.roster-item:last-child { border-bottom: none; }
.roster-item:hover { background: var(--gray-lt); }
.roster-item.on-leave { opacity: .5; cursor: default; }
.roster-item-left { display: flex; align-items: center; gap: 8px; }
.roster-item-num  { color: var(--text-sm); min-width: 28px; font-size: 12px; }
.roster-item-name { font-weight: 500; }
.roster-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: 500;
}
.roster-badge.present  { background: var(--green-lt);  color: var(--green); }
.roster-badge.absent   { background: var(--red-lt);    color: var(--red); }
.roster-badge.excused  { background: var(--blue-lt);   color: var(--blue); }
.roster-badge.leave    { background: #f3f4f6; color: #6b7280; }

/* ===== ポップアップ（小さめ） ===== */
.popup-sm {
  background: #fff; border-radius: 12px; padding: 16px;
  min-width: 240px; max-width: 300px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,.2); text-align: center;
}
.popup-sm .popup-student-name   { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.popup-sm .popup-student-number { font-size: 13px; color: var(--text-sm); margin-bottom: 14px; }
.popup-sm .popup-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.popup-sm .popup-btn { padding: 10px 6px; font-size: 13px; }

@media (max-width: 700px) {
  .seat-roster-layout { flex-direction: column; }
  .seat-area, .roster-area { width: 100%; }
}

/* ===== ミニカレンダー ===== */
.mini-calendar {
  background: #fff; border-radius: var(--radius);
  border: 1px solid var(--border); padding: 8px;
  user-select: none; width: 100%; min-width: 160px;
}
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.cal-header span { font-size: 13px; font-weight: 600; }
.cal-nav {
  background: none; border: none; cursor: pointer;
  color: var(--blue); font-size: 16px; padding: 2px 6px; border-radius: 4px;
}
.cal-nav:hover { background: var(--blue-lt); }
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
}
.cal-dow {
  text-align: center; font-size: 10px; color: var(--text-sm);
  padding: 2px 0; font-weight: 500;
}
.cal-day {
  text-align: center; font-size: 11px; padding: 3px 1px;
  border-radius: 4px; cursor: pointer; line-height: 1;
}
.cal-day:hover { background: var(--blue-lt); color: var(--blue); }
.cal-day.other-month { color: #d1d5db; }
.cal-day.today { background: var(--gray-lt); font-weight: 600; }
.cal-day.selected { background: var(--blue); color: #fff; font-weight: 600; }
.cal-day.selected:hover { background: var(--blue); }
.cal-day.sun { color: #ef4444; }
.cal-day.sat { color: #3b82f6; }
.cal-day.selected.sun, .cal-day.selected.sat { color: #fff; }

/* ===== 出欠履歴マトリクス ===== */
.history-table-wrap {
  overflow: auto;
  max-height: calc(100vh - 180px);
}
.history-matrix {
  border-collapse: collapse; font-size: 12px;
  white-space: nowrap;
}
.history-matrix th, .history-matrix td {
  border: 1px solid var(--border); padding: 4px 6px; text-align: center;
}
.history-matrix thead th {
  background: var(--blue); color: #fff;
  position: sticky; top: 0; z-index: 3;
}
.history-matrix td:first-child {
  position: sticky; left: 0; background: #fff; z-index: 2; min-width: 36px;
}
.history-matrix td:nth-child(2) {
  position: sticky; left: 36px; background: #fff; z-index: 2; min-width: 80px; text-align: left;
}
.history-matrix thead th:first-child {
  left: 0; z-index: 4;
}
.history-matrix thead th:nth-child(2) {
  left: 36px; z-index: 4;
}

.matrix-cell {
  cursor: pointer; border-radius: 3px; padding: 2px 4px;
  font-size: 11px; font-weight: 500; display: inline-block; min-width: 28px;
}
.matrix-cell.present  { background: var(--green-lt);  color: var(--green); }
.matrix-cell.absent   { background: var(--red-lt);    color: var(--red); }
.matrix-cell.excused  { background: var(--blue-lt);   color: var(--blue); }
.matrix-cell.leave    { background: #f3f4f6; color: #9ca3af; cursor: default; }
.matrix-cell.kiki    { background: #9333ea; color: #fff; }
.matrix-cell.teishi  { background: #ea580c; color: #fff; }

.btn-save-bottom {
  padding: 8px 32px; background: var(--blue); color: #fff;
  border: none; border-radius: var(--radius); font-size: 14px;
  font-weight: 600; cursor: pointer;
}
.btn-save-bottom:hover { background: #1d4ed8; }

  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="icon-btn" id="menu-btn" aria-label="メニュー">☰</button>
    <h1 class="app-title">欠課管理</h1>
    <span class="app-version" id="app-version"></span>
  </div>
  <div class="header-right">
    <select id="class-select" class="select-sm"></select>
    <input type="date" id="date-input" class="select-sm">
    <select id="period-select" class="select-sm">
      <option value="1">1限</option>
      <option value="2">2限</option>
      <option value="3">3限</option>
      <option value="4">4限</option>
      <option value="5">5限</option>
      <option value="6">6限</option>
    </select>
    <button class="btn-primary" id="save-btn">保存</button>
  </div>
</header>

<nav class="sidenav" id="sidenav">
  <div class="sidenav-header">
    <span>メニュー</span>
    <button class="icon-btn" id="close-menu-btn">✕</button>
  </div>
  <ul class="sidenav-list">
    <li><a href="#" class="sidenav-item" data-view="classselect">クラス選択</a></li>
    <li><a href="#" class="sidenav-item" data-view="history">出欠履歴</a></li>
    <li><a href="#" class="sidenav-item" data-view="summary">集計・出力</a></li>
    <li><a href="#" class="sidenav-item" data-view="settings">設定</a></li>
    <li><a href="#" class="sidenav-item" data-view="setup">年度セットアップ</a></li>
  </ul>
</nav>
<div class="overlay" id="overlay"></div>

<main class="main">

  <!-- クラス選択画面 -->
  <section class="view active" id="view-classselect">
    <div class="class-select-screen">
      <h2 class="class-select-title">クラスを選択</h2>
      <div id="class-select-list"></div>
    </div>
  </section>

  <section class="view" id="view-seat">
    <div class="view-toolbar">
      <div class="legend">
        <span class="legend-item present">出席</span>
        <span class="legend-item absent">欠席</span>
        <span class="legend-item kiki">忌引</span>
        <span class="legend-item excused">公欠</span>
        <span class="legend-item teishi">出校停止</span>
        <span class="legend-item leave">休学</span>

      </label>
      <button class="btn-primary btn-lg" id="setup-btn">スプレッドシートを作成してセットアップ</button>

</main>

<!-- 出欠ポップアップ -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup-sm">
    <div class="popup-student-name" id="popup-name"></div>
    <div class="popup-student-number" id="popup-number"></div>
    <div class="popup-buttons">
      <button class="popup-btn present" data-status="出席">出席</button>
      <button class="popup-btn absent"  data-status="欠席">欠席</button>
      <button class="popup-btn kiki"    data-status="忌引">忌引</button>
      <button class="popup-btn excused" data-status="公欠">公欠</button>
      <button class="popup-btn teishi"  data-status="出校停止">出校停止</button>

</div>

<!-- 休学設定ポップアップ -->
<div class="popup-overlay" id="leave-overlay">
  <div class="popup">
    <div class="popup-student-name" id="leave-name"></div>
    <div class="popup-student-number" id="leave-number"></div>
    <div class="leave-form">
      <label>休学開始日<input type="date" id="leave-start"></label>
      <label>休学終了日<input type="date" id="leave-end"></label>
    </div>
    <div class="leave-buttons">
      <button class="btn-primary" id="leave-save-btn">保存</button>
      <button class="btn-danger"  id="leave-clear-btn">クリア</button>
    </div>
    <br>
    <button class="popup-close" onclick="closeLeavePopup()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// app.js - 授業欠課時数管理アプリ（GAS版）
// =============================================

const VERSION = '20260601-001';

const STATE = {
  className:      '',
  attendance:     {},
  students:       [],
  settings:       [],
  currentStudent: null,
  unsaved:        false, // 未保存フラグ
};

const STATUS_CLASS = {
  '出席':   'present',
  '欠席':   'absent',
  '忌引':   'kiki',
  '公欠':   'excused',
  '出校停止': 'teishi',
  '休学':   'leave',
};

const STATUS_BADGE = {
  '欠席':   '欠',
  '忌引':   '忌',
  '公欠':   '公',
  '出校停止': '停',
  '休学':   '休',
};

const $ = id => document.getElementById(id);

// ===== GAS API =====
function gasCall(funcName, params) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(reject)
      [funcName](JSON.stringify(params));
  });
}

// ===== 初期化 =====
function init() {
  const today = toJSTDateString(new Date());
  if ($('date-input'))    $('date-input').value = today;
  if ($('setup-year'))    $('setup-year').value = new Date().getFullYear();
  if ($('summary-start')) $('summary-start').value = today.slice(0, 7) + '-01';
  if ($('summary-end'))   $('summary-end').value = today;

  const vEl = $('app-version');
  if (vEl) vEl.textContent = 'v' + VERSION;

  setupEventListeners();
  loadInitialData();

  window.addEventListener('beforeunload', e => {
    if (STATE.unsaved) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
}

async function loadInitialData() {
  try {
    const [sr, st] = await Promise.all([
      gasCall('clientGetSettings', {}),
      gasCall('clientGetStudents', {}),
    ]);
    STATE.settings = sr.settings || [];
    STATE.students = st.students || [];
    updateClassSelects();
    renderSettingsGrid();
    renderClassSelectScreen();
  } catch (e) {
    showToast('データ読み込み失敗: ' + e.message);
  }
}

function renderClassSelectScreen() {
  const listEl = $('class-select-list');
  if (!listEl) return;
  const classes = STATE.settings.map(s => s.className);
  listEl.innerHTML = classes.length === 0
    ? '<p style="color:#888;text-align:center">クラスがありません。年度セットアップからクラスを追加してください。</p>'
    : classes.map(c => `
        <button class="class-select-btn" onclick="selectClassAndGo('${c}')">${c}</button>
      `).join('');
}

function selectClassAndGo(className) {
  STATE.className = className;
  $('class-select').value = className;
  localStorage.setItem('className', className);
  switchView('seat');
  renderCalendar();
  loadAttendance();
}

// ===== イベント =====
function setupEventListeners() {
  $('menu-btn').addEventListener('click', openMenu);
  $('close-menu-btn').addEventListener('click', closeMenu);
  $('overlay').addEventListener('click', closeMenu);

  document.querySelectorAll('.sidenav-item').forEach(item => {
    item.addEventListener('click', e => {
      e.preventDefault();
      switchView(item.dataset.view);
      closeMenu();
    });
  });

  $('class-select').addEventListener('change', () => {
    if (STATE.unsaved && !confirm('保存されていない変更があります。クラスを切り替えますか？')) {
      $('class-select').value = STATE.className;
      return;
    }
    STATE.unsaved = false;
    STATE.className = $('class-select').value;
    loadAttendance();
    renderSeatMap();
  });
  $('period-select').addEventListener('change', () => {
    if (STATE.unsaved && !confirm('保存されていない変更があります。時限を切り替えますか？')) return;
    STATE.unsaved = false;
    loadAttendance();
  });
  $('date-input').addEventListener('change', () => {
    if (STATE.unsaved && !confirm('保存されていない変更があります。日付を変更しますか？')) return;
    STATE.unsaved = false;
    const d = parseLocalDate($('date-input').value);
    CAL.year  = d.getFullYear();
    CAL.month = d.getMonth();
    renderCalendar();
    loadAttendance();
  });
  $('save-btn').addEventListener('click', saveAttendance);
  if ($('save-btn-bottom')) $('save-btn-bottom').addEventListener('click', saveAttendance);

  $('popup-close').addEventListener('click', closePopup);
  $('popup-overlay').addEventListener('click', e => { if (e.target === $('popup-overlay')) closePopup(); });
  document.querySelectorAll('.popup-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      setStatus(STATE.currentStudent, btn.dataset.status);
      closePopup();
    });
  });

  $('leave-save-btn').addEventListener('click', saveLeaveperiod);
  $('leave-clear-btn').addEventListener('click', clearLeaveperiod);

  if ($('history-load-btn')) $('history-load-btn').addEventListener('click', loadHistory);
  $('save-settings-btn').addEventListener('click', saveSettings);
  $('csv-input').addEventListener('change', previewCSV);
  $('csv-upload-btn').addEventListener('click', uploadCSV);
  $('setup-btn').addEventListener('click', runSetup);
  $('summary-btn').addEventListener('click', downloadSummary);
  $('add-class-btn').addEventListener('click', async () => {
    const input = $('new-class-input');
    const className = input.value.trim();
    if (!className) { showToast('クラス名を入力してください'); return; }
    try {
      const res = await gasCall('clientAddClass', { className });
      if (res.error) { showToast(res.error); return; }
      showToast(`${className} を追加しました`);
      input.value = '';
      await reloadSettings();
    } catch (e) {
      showToast('追加失敗: ' + e.message);
    }
  });
}

// ===== メニュー =====
function openMenu()  { $('sidenav').classList.add('open'); $('overlay').classList.add('show'); }
function closeMenu() { $('sidenav').classList.remove('open'); $('overlay').classList.remove('show'); }

// ===== ビュー切り替え =====
function switchView(v) {
  if (STATE.unsaved && !confirm('保存されていない変更があります。移動しますか？')) return;
  STATE.unsaved = false;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidenav-item').forEach(el => el.classList.remove('active'));
  $('view-' + v).classList.add('active');
  const navItem = document.querySelector(`[data-view="${v}"]`);
  if (navItem) navItem.classList.add('active');
  if (v === 'seat')        { loadAttendance(); renderCalendar(); }
  if (v === 'number')      renderStudentList();
  if (v === 'classselect') renderClassSelectScreen();
  if (v === 'history')     initHistoryView();
  if (v === 'setup')       { loadYears(); renderClassList(); }
}

// ===== クラス選択肢 =====
function updateClassSelects() {
  const classes = [...new Set(STATE.settings.map(s => s.className))];
  ['class-select', 'csv-class-select', 'summary-class-select', 'history-class-select'].forEach(id => {
    const sel = $(id);
    if (!sel) return;
    sel.innerHTML = classes.map(c => `<option value="${c}">${c}</option>`).join('');
  });
  if (!STATE.className && classes.length > 0) STATE.className = classes[0];
  $('class-select').value = STATE.className;
}

// ===== 出欠読み込み =====
async function loadAttendance(dateStr) {
  if (!STATE.className) return;
  const date = dateStr || $('date-input').value;
  try {
    const params = {
      date: date,
      period: $('period-select').value,
      className: STATE.className,
    };
    const res = await gasCall('clientGetAttendance', params);
    STATE.attendance = {};
    if (res && res.records) {
      res.records.forEach(r => { STATE.attendance[r.number] = r.status; });
    }
    // データ取得完了後に日付を更新
    if (dateStr) {
      $('date-input').value = dateStr;
      renderCalendar();
    }
    renderSeatMap();
    renderRoster();
    updateAbsentCount();
  } catch (e) { console.error(e); }
}

// ===== 退学判定 =====
function isWithdrawn(student) {
  return !student.seatRow && !student.seatCol;
}

// ===== 出欠保存 =====
async function saveAttendance() {
  const today = toJSTDateString(new Date());
  const classStudents = STATE.students.filter(s => s.className === STATE.className);
  const records = classStudents.map(s => {
    if (isWithdrawn(s) || isOnLeave(s, today)) {
      return { number: s.number, name: s.name, status: '' };
    }
    return {
      number: s.number,
      name:   s.name,
      status: STATE.attendance[s.number] || '出席',
    };
  });
  try {
    $('save-btn').textContent = '保存中...';
    await gasCall('clientSaveAttendance', {
      date:      $('date-input').value,
      period:    $('period-select').value,
      className: STATE.className,
      records,
    });
    showToast('保存しました ✓');
    STATE.unsaved = false;
  } catch (e) {
    showToast('保存失敗: ' + e.message);
  } finally {
    $('save-btn').textContent = '保存';
  }
}

// ===== ステータス変更 =====
function setStatus(student, status) {
  if (status === '出席') {
    delete STATE.attendance[student.number];
  } else {
    STATE.attendance[student.number] = status;
  }
  STATE.unsaved = true;
  renderSeatMap();
  renderRoster();
  updateAbsentCount();
}

// ===== 休学期間判定 =====
function isOnLeave(student, dateStr) {
  if (!student.leaveStart) return false;
  const parseDate = str => {
    const p = str.split(/[-\/]/).map(Number);
    return new Date(p[0], p[1] - 1, p[2]);
  };
  const target = parseDate(dateStr);
  const start  = parseDate(student.leaveStart);
  const end    = student.leaveEnd ? parseDate(student.leaveEnd) : null;
  return target >= start && (!end || target <= end);
}

// ===== 座席マップ描画 =====
function renderSeatMap() {
  const setting = STATE.settings.find(s => s.className === STATE.className);
  if (!setting) {
    $('seat-map').innerHTML = '<p style="color:#888;padding:20px">設定がありません</p>';
    return;
  }

  const { rows, cols } = setting;
  $('seat-map').style.gridTemplateColumns = `repeat(${cols}, 72px)`;

  const today = $('date-input').value;
  const classStudents = STATE.students.filter(s => s.className === STATE.className);
  const seatMap = {};
  classStudents.forEach(s => {
    if (s.seatRow && s.seatCol) seatMap[`${s.seatRow}-${s.seatCol}`] = s;
  });

  let html = '';
  for (let r = 1; r <= rows; r++) {
    for (let c = 1; c <= cols; c++) {
      const student = seatMap[`${r}-${c}`];
      if (!student) {
        html += `<div class="seat empty"></div>`;
        continue;
      }

      const onLeave = isOnLeave(student, today);
      if (onLeave) {
        html += `<div class="seat leave-seat" data-number="${student.number}">
          <span class="seat-number">${student.number}番</span>
          <span class="seat-name">${student.name}</span>
          <span class="seat-badge leave-badge">休</span>
        </div>`;
        continue;
      }

      const status = STATE.attendance[student.number] || '出席';
      const cls    = STATUS_CLASS[status] || 'present';
      const badge  = STATUS_BADGE[status] || '';
      html += `<div class="seat ${cls}" data-number="${student.number}">
        <span class="seat-number">${student.number}番</span>
        <span class="seat-name">${student.name}</span>
        ${badge ? `<span class="seat-badge">${badge}</span>` : ''}
      </div>`;
    }
  }
  $('seat-map').innerHTML = html;

  $('seat-map').querySelectorAll('.seat:not(.empty):not(.leave-seat)').forEach(el => {
    el.addEventListener('click', () => {
      const student = classStudents.find(s => String(s.number) === String(el.dataset.number));
      if (student) openPopup(student);
    });
  });

  $('seat-map').querySelectorAll('.leave-seat').forEach(el => {
    el.addEventListener('click', () => {
      const student = classStudents.find(s => String(s.number) === String(el.dataset.number));
      if (student) openLeavePopup(student);
    });
  });

  renderRoster();
}

// ===== 名簿描画 =====
function renderRoster() {
  const rosterEl = $('roster-list');
  if (!rosterEl) return;

  const today = $('date-input').value;
  const classStudents = STATE.students
    .filter(s => s.className === STATE.className)
    .sort((a, b) => Number(a.number) - Number(b.number));

  rosterEl.innerHTML = classStudents.map(s => {
    const onLeave = isOnLeave(s, today);
    const status  = onLeave ? '休学' : (STATE.attendance[s.number] || '出席');
    const cls     = STATUS_CLASS[status] || 'present';
    return `<div class="roster-item ${onLeave ? 'on-leave' : ''}" data-number="${s.number}">
      <div class="roster-item-left">
        <span class="roster-item-num">${s.number}</span>
        <span class="roster-item-name">${s.name}</span>
      </div>
      <span class="roster-badge ${cls}">${status}</span>
    </div>`;
  }).join('');

  rosterEl.querySelectorAll('.roster-item:not(.on-leave)').forEach(el => {
    el.addEventListener('click', () => {
      const student = classStudents.find(s => String(s.number) === String(el.dataset.number));
      if (student) openPopup(student);
    });
  });

  rosterEl.querySelectorAll('.roster-item.on-leave').forEach(el => {
    el.addEventListener('click', () => {
      const student = classStudents.find(s => String(s.number) === String(el.dataset.number));
      if (student) openLeavePopup(student);
    });
  });
}

// ===== 生徒リスト描画 =====
function renderStudentList(filter = '') {
  const today = $('date-input').value;
  const classStudents = STATE.students
    .filter(s => s.className === STATE.className)
    .filter(s => !filter || String(s.number).startsWith(filter) || s.name.includes(filter))
    .sort((a, b) => Number(a.number) - Number(b.number));

  $('student-list').innerHTML = classStudents.map(s => {
    const onLeave = isOnLeave(s, today);
    const status  = onLeave ? '休学' : (STATE.attendance[s.number] || '出席');
    const cls     = STATUS_CLASS[status] || 'present';
    return `<div class="student-row ${onLeave ? 'on-leave' : ''}" data-number="${s.number}">
      <div class="student-row-left">
        <span class="student-row-num">${s.number}番</span>
        <span class="student-row-name">${s.name}</span>
      </div>
      <span class="status-badge ${cls}">${status}</span>
    </div>`;
  }).join('');

  $('student-list').querySelectorAll('.student-row').forEach(el => {
    el.addEventListener('click', () => {
      const student = classStudents.find(s => String(s.number) === String(el.dataset.number));
      if (!student) return;
      if (el.classList.contains('on-leave')) {
        openLeavePopup(student);
      } else {
        openPopup(student);
      }
    });
  });
}

function filterStudentList(val) { renderStudentList(val.trim()); }

function updateAbsentCount() {
  const count = Object.values(STATE.attendance).filter(s => s !== '出席').length;
  $('absent-count').textContent = count;
}

// ===== 出欠ポップアップ =====
function openPopup(student) {
  STATE.currentStudent = student;
  $('popup-name').textContent   = student.name;
  $('popup-number').textContent = `${STATE.className} ${student.number}番`;
  const current = STATE.attendance[student.number] || '出席';
  document.querySelectorAll('.popup-btn').forEach(btn => {
    btn.style.opacity = btn.dataset.status === current ? '1' : '0.7';
    btn.style.outline = btn.dataset.status === current ? '3px solid #111' : 'none';
  });
  $('popup-overlay').classList.add('show');
}
function closePopup() { $('popup-overlay').classList.remove('show'); STATE.currentStudent = null; }

// ===== 休学設定ポップアップ =====
function openLeavePopup(student) {
  STATE.currentStudent = student;
  $('leave-name').textContent   = student.name;
  $('leave-number').textContent = `${STATE.className} ${student.number}番`;
  $('leave-start').value = student.leaveStart || '';
  $('leave-end').value   = student.leaveEnd   || '';
  $('leave-overlay').classList.add('show');
}
function closeLeavePopup() { $('leave-overlay').classList.remove('show'); STATE.currentStudent = null; }

async function saveLeaveperiod() {
  const student = STATE.currentStudent;
  const leaveStart = $('leave-start').value;
  const leaveEnd   = $('leave-end').value;
  try {
    await gasCall('clientSaveLeaveperiod', {
      className:  STATE.className,
      number:     student.number,
      leaveStart, leaveEnd,
    });
    student.leaveStart = leaveStart;
    student.leaveEnd   = leaveEnd;
    showToast('休学期間を保存しました ✓');
    closeLeavePopup();
    renderSeatMap();
    renderStudentList();
  } catch (e) {
    showToast('保存失敗: ' + e.message);
  }
}

async function clearLeaveperiod() {
  const student = STATE.currentStudent;
  try {
    await gasCall('clientSaveLeaveperiod', {
      className:  STATE.className,
      number:     student.number,
      leaveStart: '',
      leaveEnd:   '',
    });
    student.leaveStart = '';
    student.leaveEnd   = '';
    showToast('休学期間をクリアしました ✓');
    closeLeavePopup();
    renderSeatMap();
    renderStudentList();
  } catch (e) {
    showToast('クリア失敗: ' + e.message);
  }
}

// ===== 履歴マトリクス =====
async function loadHistory() {
  const className = $('history-class-select').value;
  const startDate = $('history-start').value;
  const endDate   = $('history-end').value;
  if (!className || !startDate || !endDate) { showToast('クラスと期間を指定してください'); return; }

  const wrap = $('history-table-wrap');
  wrap.innerHTML = '<p style="color:#888;padding:20px">読み込み中...</p>';

  try {
    const res = await gasCall('clientGetAttendanceMatrix', { className, startDate, endDate });
    const { lessons, students, matrix } = res;

    if (!lessons || lessons.length === 0) {
      wrap.innerHTML = '<p style="color:#888;padding:20px">記録なし</p>';
      return;
    }

    // ヘッダー行
    const headerCols = lessons.map(key => {
      const [date, period] = key.split('_');
      const d = parseLocalDate(date);
      const label = `${d.getMonth()+1}/${d.getDate()}<br>${period}限`;
      return `<th class="lesson-header" data-date="${date}" data-period="${period}" onclick="confirmDeleteLesson(this)" style="cursor:pointer" title="タップで削除">${label}<br><span style="font-size:10px;opacity:0.5">🗑</span></th>`;
    }).join('');

    // データ行
    const dataRows = students.map(s => {
      const cells = lessons.map(key => {
        const [date, period] = key.split('_');
        const status = (matrix[s.number] || {})[key] || '出席';
        const cls = STATUS_CLASS[status] || 'present';
        const label = STATUS_LABEL[status] || '休';
        const onLeave = isOnLeave(s, date);
        if (onLeave || status === '休学') return `<td><span class="matrix-cell leave">－</span></td>`;
        return `<td><span class="matrix-cell ${cls}"
          data-number="${s.number}" data-date="${date}" data-period="${period}" data-class="${className}"
          onclick="cycleStatus(this)">${label}</span></td>`;
      }).join('');
      return `<tr><td>${s.number}</td><td>${s.name}</td>${cells}</tr>`;
    }).join('');

    wrap.innerHTML = `
      <table class="history-matrix">
        <thead><tr><th>番号</th><th>名前</th>${headerCols}</tr></thead>
        <tbody>${dataRows}</tbody>
      </table>`;

  } catch (e) { showToast('履歴読み込み失敗: ' + e.message); }
}

// セルをクリックするたびに状態を循環させて即保存
const STATUS_CYCLE = ['出席', '欠席', '忌引', '公欠', '出校停止'];
const STATUS_LABEL = { '出席': '○', '欠席': '×', '忌引': '忌', '公欠': '公', '出校停止': '停' };

async function cycleStatus(el) {
  const current = Object.keys(STATUS_LABEL).find(s => STATUS_LABEL[s] === el.textContent) || '出席';
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(current) + 1) % STATUS_CYCLE.length];
  const cls  = STATUS_CLASS[next];
  el.textContent = STATUS_LABEL[next];
  el.className = `matrix-cell ${cls}`;

  try {
    await gasCall('clientUpdateAttendanceCell', {
      date:      el.dataset.date,
      period:    el.dataset.period,
      className: el.dataset.class,
      number:    el.dataset.number,
      status:    next,
    });
  } catch (e) {
    showToast('更新失敗: ' + e.message);
  }
}

// ===== 設定 =====
function renderSettingsGrid() {
  $('settings-grid').innerHTML = STATE.settings.map((s, i) => `
    <div class="settings-card">
      <h3>${s.className}</h3>
      <label>行数</label>
      <input type="number" data-idx="${i}" data-field="rows" value="${s.rows}" min="1" max="20">
      <label>列数</label>
      <input type="number" data-idx="${i}" data-field="cols" value="${s.cols}" min="1" max="20">
    </div>`).join('');

  $('settings-grid').querySelectorAll('input').forEach(input => {
    input.addEventListener('change', () => {
      STATE.settings[input.dataset.idx][input.dataset.field] = Number(input.value);
    });
  });
}

async function saveSettings() {
  try {
    await gasCall('clientSaveSettings', { settings: STATE.settings });
    showToast('設定を保存しました ✓');
    renderSeatMap();
  } catch (e) { showToast('設定保存失敗: ' + e.message); }

// ===== CSV読み込み =====
let csvData = [];
function previewCSV() {
  const file = $('csv-input').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l => l.trim());
    csvData = lines.slice(1).map(line => {
      const parts = line.split(',');
      return {
        className: parts[0]?.trim(),
        number:    parts[1]?.trim(),
        name:      parts[2]?.trim(),
        seatRow:   parts[3]?.trim() || '',
        seatCol:   parts[4]?.trim() || '',
      };
    }).filter(s => s.className && s.number && s.name);
    $('csv-preview').textContent = `${csvData.length}人 読み込み予定`;
  };
  reader.readAsText(file, 'UTF-8');
}

async function uploadCSV() {
  if (csvData.length === 0) { showToast('CSVを選択してください'); return; }
  const className = $('csv-class-select').value;
  const classData = csvData.filter(s => s.className === className);
  if (classData.length === 0) { showToast(`${className}のデータがCSVにありません`); return; }
  try {
    await gasCall('clientSaveStudents', { className, students: classData });
    STATE.students = STATE.students.filter(s => s.className !== className);
    classData.forEach(s => STATE.students.push({ ...s, leaveStart: '', leaveEnd: '' }));
    showToast(`${classData.length}人 アップロード完了 ✓`);
    renderSeatMap();
    renderRoster();
    csvData = [];
    $('csv-preview').textContent = '';
    $('csv-input').value = '';
  } catch (e) { showToast('アップロード失敗: ' + e.message); }
}

// ===== セットアップ =====
async function runSetup() {
  const year   = $('setup-year').value;
  const folder = $('setup-folder').value;
  if (!year) { showToast('年度を入力してください'); return; }
  try {
    $('setup-btn').textContent = '作成中...';
    const res = await gasCall('clientSetupYear', { year, folderName: folder });
    showToast(`${res.spreadsheetName} を作成しました ✓`);
    loadYears();
    loadInitialData();
  } catch (e) { showToast('セットアップ失敗: ' + e.message); }
  finally { $('setup-btn').textContent = 'スプレッドシートを作成してセットアップ'; }
}

async function loadYears() {
  try {
    const res = await gasCall('clientGetYears', {});
    const years = res.years || [];
    $('years-list').innerHTML = years.length === 0
      ? '<p style="color:#888;font-size:14px">年度データなし</p>'
      : years.map(y => `<div class="year-row">
          <div>
            <div style="font-weight:600">${y.name}</div>

          </div>
          <button class="btn-secondary" onclick="switchYear('${y.spreadsheetId}')">切り替え</button>

}

async function switchYear(spreadsheetId) {
  try {
    await gasCall('clientSwitchYear', { spreadsheetId });
    showToast('年度を切り替えました ✓');
    loadInitialData();
  } catch (e) { showToast('切り替え失敗: ' + e.message); }
}

// ===== 集計・CSV出力 =====
async function downloadSummary() {
  const className  = $('summary-class-select').value;
  const startDate  = $('summary-start').value;
  const endDate    = $('summary-end').value;
  if (!startDate || !endDate) { showToast('期間を指定してください'); return; }

  try {
    $('summary-btn').textContent = '集計中...';
    const res = await gasCall('clientGetAttendanceSummary', { className, startDate, endDate });
    const summary = res.summary || [];

    // CSVを生成
    const rows = [['出席番号', '名前', '授業時数', '欠課時数']];
    summary.forEach(s => {
      rows.push([s.number, s.name, s.lessonCount, s.absenceCount]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const bom = '\uFEFF';
    const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${className}_欠課集計_${startDate}_${endDate}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSVをダウンロードしました ✓');
  } catch (e) { showToast('集計失敗: ' + e.message); }
  finally { $('summary-btn').textContent = '集計してCSVダウンロード'; }
}

  $('toast').textContent = msg;
  $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('show'), 3000);

// ===== クラス管理 =====
async function renderClassList() {
  try {
    const res = await gasCall('clientGetSettings', {});
    const settings = res.settings || [];
    const listEl = $('class-list');
    if (!listEl) return;

    listEl.innerHTML = settings.length === 0

async function deleteClassHandler(className) {
  if (!confirm(`「${className}」を削除しますか？`)) return;
  try {
    await gasCall('clientDeleteClass', { className });
    showToast(`${className} を削除しました`);
    await reloadSettings();
  } catch (e) {
    showToast('削除失敗: ' + e.message);
  }
}

async function reloadSettings() {
  const res = await gasCall('clientGetSettings', {});
  STATE.settings = res.settings || [];
  updateClassSelects();
  renderSettingsGrid();
  renderClassList();
}

// ===== ミニカレンダー =====
const CAL = {
  year:  new Date().getFullYear(),
  month: new Date().getMonth(), // 0-indexed
};

const DOW = ['日', '月', '火', '水', '木', '金', '土'];

function renderCalendar() {
  const el = $('mini-calendar');
  if (!el) return;

  const today    = new Date();
  const selected = parseLocalDate($('date-input').value);
  const firstDay = new Date(CAL.year, CAL.month, 1);
  const lastDay  = new Date(CAL.year, CAL.month + 1, 0);

  let html = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calMove(-1)">‹</button>
      <span>${CAL.year}年${CAL.month + 1}月</span>
      <button class="cal-nav" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-grid">
      ${DOW.map(d => `<div class="cal-dow">${d}</div>`).join('')}
  `;

  // 月初の空白
  for (let i = 0; i < firstDay.getDay(); i++) {
    html += `<div class="cal-day other-month"></div>`;
  }

  // 日付
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(CAL.year, CAL.month, d);
    const dateStr = `${CAL.year}-${String(CAL.month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday    = date.toDateString() === today.toDateString();
    const isSelected = date.toDateString() === selected.toDateString();
    const dow = date.getDay();
    const cls = [
      'cal-day',
      dow === 0 ? 'sun' : dow === 6 ? 'sat' : '',
      isToday    ? 'today'    : '',
      isSelected ? 'selected' : '',
    ].filter(Boolean).join(' ');
    html += `<div class="${cls}" onclick="calSelect('${dateStr}')">${d}</div>`;
  }

  html += `</div>`;
  el.innerHTML = html;
}

function calMove(dir) {
  CAL.month += dir;
  if (CAL.month < 0)  { CAL.month = 11; CAL.year--; }
  if (CAL.month > 11) { CAL.month = 0;  CAL.year++; }
  renderCalendar();
}

function calSelect(dateStr) {
  if (STATE.unsaved && !confirm('保存されていない変更があります。日付を移動しますか？')) return;
  STATE.unsaved = false;
  STATE.pendingDate = dateStr;
  loadAttendance(dateStr);
}

function toJSTDateString(date) {
  const jst = new Date(date.getTime() + 9 * 60 * 60 * 1000);
  return jst.toISOString().split('T')[0];
}

function parseLocalDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function initHistoryView() {
  const today = new Date();
  const firstOfMonth = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-01`;
  const todayStr = today.toISOString().split('T')[0];
  if ($('history-start')) $('history-start').value = firstOfMonth;
  if ($('history-end'))   $('history-end').value   = todayStr;
  if ($('history-class-select') && STATE.className) $('history-class-select').value = STATE.className;
}

// ===== 授業コマ削除 =====
async function confirmDeleteLesson(th) {
  const date   = th.dataset.date;
  const period = th.dataset.period;
  const className = $('history-class-select').value;
  const [, month, day] = date.split('-');
  if (!confirm(`${month}/${day} ${period}限の記録を削除しますか？\nこの操作は取り消せません。`)) return;
  try {
    const res = await gasCall('clientDeleteLesson', { date, period, className });
    if (res.error) { showToast('削除失敗: ' + res.error); return; }
    showToast('削除しました ✓');
    loadHistory();
  } catch (e) {
    showToast('削除失敗: ' + e.message);
  }
}
